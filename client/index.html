<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmetics App</title>
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand-lockup" href="/" data-link>
          <span class="brand-mark">C</span>
          <span>
            <strong>Cosmetics</strong>
            <small>инвентарь</small>
          </span>
        </a>

        <nav class="nav" aria-label="Основная навигация">
          <a href="/categories" data-link>Категории</a>
          <a href="/products" data-link>Продукты</a>
          <a href="/brands" data-link>Бренды</a>
          <details class="nav-section" open>
            <summary>Администрирование</summary>
            <div class="nav-subnav">
              <a href="/admin/brands" data-link>Бренды</a>
              <a href="/admin/categories" data-link>Категории</a>
              <a href="/api-docs" target="_blank" rel="noreferrer">OpenAPI</a>
            </div>
          </details>
        </nav>

        <div class="status-card">
          <span class="status-dot" id="statusDot"></span>
          <div>
            <strong id="statusTitle">Готово</strong>
            <p id="statusText">Интерфейс загружен</p>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <div id="app"></div>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
